<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>bai</title>
  <defs>
    <!-- Dark frosted square background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>

    <!-- Outer atmosphere halo (orange + purple + blue) -->
    <radialGradient id="halo" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#e27b4a" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#7a5ac8" stop-opacity="0.38"/>
      <stop offset="65%" stop-color="#3f6aa8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Planet body: warm crescent top-left → dark body → purple/blue penumbra -->
    <radialGradient id="planet" cx="32%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#ffd3aa"/>
      <stop offset="10%" stop-color="#f59a62"/>
      <stop offset="22%" stop-color="#b5522e"/>
      <stop offset="38%" stop-color="#3a2238"/>
      <stop offset="62%" stop-color="#1c1a3a"/>
      <stop offset="100%" stop-color="#020205"/>
    </radialGradient>

    <!-- Cool rim on the shadow side -->
    <radialGradient id="rim" cx="72%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#5a70bf" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#3a4e9c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="planetClip">
      <circle cx="16" cy="16" r="9"/>
    </clipPath>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Halo behind the planet -->
  <circle cx="16" cy="16" r="13.5" fill="url(#halo)"/>

  <!-- Planet body -->
  <circle cx="16" cy="16" r="9" fill="url(#planet)"/>

  <!-- Shadow-side rim light, clipped to the sphere -->
  <g clip-path="url(#planetClip)">
    <circle cx="16" cy="16" r="9" fill="url(#rim)"/>
  </g>

  <!-- Subtle inner highlight on the lit edge -->
  <circle cx="13.2" cy="12.7" r="1.4" fill="#ffe6ca" fill-opacity="0.55"/>

  <!-- Border to echo the frost-panel -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" ry="6.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
